<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pahan AI</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button id="newChatBtn" class="new-chat-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                New Chat
            </button>
        </div>
        <div class="sidebar-conversations" id="conversationList">
            <!-- Conversations loaded dynamically -->
        </div>
        <div class="sidebar-footer">
            <button id="clearAllBtn" class="clear-all-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                Clear All Chats
            </button>
        </div>
    </aside>

    <!-- Main Chat Area -->
    <main class="main-area">
        <div class="chat-topbar">
            <button class="sidebar-toggle" id="sidebarToggle">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
            <h1 class="topbar-title">Pahan AI</h1>
        </div>

        <div class="chat-messages" id="chatBox">
            <div class="welcome-screen" id="welcomeScreen">
                <div class="welcome-icon">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2Z"></path><path d="M12 16v-4"></path><path d="M12 8h.01"></path></svg>
                </div>
                <h2>How can I help you today?</h2>
                <p>Ask me anything, or attach an image or document to get started.</p>
            </div>
        </div>

        <div class="input-wrapper">
            <!-- Attachment preview area -->
            <div class="attachment-preview" id="attachmentPreview" style="display: none;"></div>

            <div class="input-area">
                <div class="input-actions">
                    <input type="file" id="imageInput" accept="image/*" style="display: none;" multiple>
                    <button class="attach-btn" id="imageBtn" title="Attach image">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                    </button>
                    <input type="file" id="docInput" accept=".pdf,.doc,.docx,.txt,.csv,.json,.xml,.md,.rtf" style="display: none;" multiple>
                    <button class="attach-btn" id="docBtn" title="Attach document">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    </button>
                </div>
                <textarea id="userInput" placeholder="Message Pahan AI..." rows="1"></textarea>
                <button class="send-btn" id="sendBtn" disabled>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
            <p class="disclaimer">Pahan AI can make mistakes. Consider checking important information.</p>
        </div>
    </main>
</div>

<script src="script.js"></script>
</body>
</html>
